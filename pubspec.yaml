name: mango
description: "A minimal, dark-mode, Android-first manga and book reader."
publish_to: 'none'
version: 3.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Local database
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Networking & images
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  photo_view: ^0.15.0

  # Saving pages to the device gallery
  gal: ^2.3.0

  # Sharing the exported library file
  share_plus: ^10.0.0

  # Picking a JSON file to import
  file_picker: ^8.1.0

  # PDF & EPUB books
  pdfx: ^2.6.0
  epubx: ^4.0.0
  image: ^3.3.0  # pinned to 3.x to match epubx's constraint
  flutter_widget_from_html_core: ^0.16.0
  scrollable_positioned_list: ^0.3.8
  html: ^0.15.4

  # Models & serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Utilities
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.0+1
  drift_dev: ^2.20.0
  freezed: ^3.2.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/reference.json
